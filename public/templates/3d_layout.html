<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Project Viewer</title>
  <!-- Model Viewer Script -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <!-- Tailwind CSS (for quick styling) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; }
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    .description-container {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      width: 20rem;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 1rem;
      padding: 1.5rem;
      color: white;
      font-family: sans-serif;
      z-index: 10;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div id="viewer-container" class="w-full h-full relative">
    <!-- 3D Model Viewer -->
    <model-viewer 
      id="model" 
      src="" 
      alt="A 3D model" 
      auto-rotate 
      camera-controls 
      shadow-intensity="1" 
      exposure="1" 
      environment-image="neutral">
      
      <div slot="progress-bar" class="w-full h-full flex items-center justify-center bg-slate-900 absolute inset-0 z-50">
        <div class="text-white text-lg">Loading 3D Model...</div>
      </div>
    </model-viewer>

    <!-- Description Overlay -->
    <div id="info" class="description-container hidden">
      <h1 id="title" class="text-2xl font-bold mb-3 text-blue-400">Project Name</h1>
      <p id="description" class="text-slate-300 text-sm mb-4 leading-relaxed"></p>
      <div id="documentation" class="prose prose-sm prose-invert text-slate-400 mt-4 pt-4 border-t border-slate-700/50"></div>
    </div>
  </div>

  <script>
    // Extract parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const modelUrl = urlParams.get('model');
    const title = urlParams.get('title');
    const description = urlParams.get('desc');
    const doc = urlParams.get('doc'); // Can be base64 encoded HTML or just text

    // Fill UI
    if (modelUrl) {
      document.getElementById('model').src = modelUrl;
    }
    
    if (title || description || doc) {
      document.getElementById('info').classList.remove('hidden');
      if (title) document.getElementById('title').textContent = title;
      if (description) document.getElementById('description').textContent = description;
      if (doc) {
        // Basic decoding if it's base64 encoded for safety in URLs
        try {
          const decodedDoc = atob(doc);
          document.getElementById('documentation').innerHTML = decodedDoc;
        } catch (e) {
          document.getElementById('documentation').innerHTML = doc;
        }
      }
    }
  </script>
</body>
</html>
